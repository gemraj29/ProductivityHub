name: ProductivityHub
options:
  bundleIdPrefix: com.example
targets:
  ProductivityHub:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Sources
    settings:
      CODE_SIGN_IDENTITY: ""
      CODE_SIGNING_REQUIRED: "NO"
      CODE_SIGNING_ALLOWED: "NO"
    info:
      path: Sources/Info.plist
  ProductivityHub_Current:
    type: application
    platform: iOS
    deploymentTarget: "16.4"
    sources:
      - Sources
    settings:
      CODE_SIGN_IDENTITY: ""
      CODE_SIGNING_REQUIRED: "NO"
      CODE_SIGNING_ALLOWED: "NO"
    info:
      path: Sources/Info.plist
  ProductivityHubTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Tests
    dependencies:
      - target: ProductivityHub
    settings:
      GENERATE_INFOPLIST_FILE: "YES"
  ProductivityHubTests_Current:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.4"
    sources:
      - Tests
    dependencies:
      - target: ProductivityHub_Current
    settings:
      GENERATE_INFOPLIST_FILE: "YES"
